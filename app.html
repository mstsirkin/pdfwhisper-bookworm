<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF Whisper: Speak Low If You Speak</title>
</head>
<body>

<div id="app"></div>

<!-- Libraries are loaded lazily in JS with CDN fallback. -->

<script>
/*
Single-file JS app (no build step).
Usage: include in an HTML page as:
  <script type="module" src="app.js"><\/script>

This script builds the UI and runs:
PDF -> PNG (PDF.js) -> text (OpenAI Responses) -> AAC (OpenAI TTS) -> per-page downloads + ZIPs.
*/

const APP = {
  state: {
    running: false,
    cancelled: false,
    pdfFile: null,
    pdfBytes: null,
    pdfDoc: null,
    pageCount: 0,
    pages: [], // {i, stage, txt, aacBytes(Uint8Array), err, aborts:[], _running, _queued, _restartPending}
    scheduler: null,
    downloadName: "",
    pageRangeFrom: "",
    pageRangeTo: "",
    // persisted
    apiKey: "",
    prompt: "",
    // settings
    visionModel: "gpt-4o-mini",
    ttsModel: "gpt-4o-mini-tts",
    voice: "coral",
    ttsInstructions: "", // optional
    scale: 2,
    maxParallel: 30,
    requestStaggerSec: 1,
    retryOnRateLimit495: true,
    settingsExpanded: false,
  },
  defaults: {
    prompt:
`look at this page from a paper, taking into account that papers can use varying indent and fonts for emphasis, and remove repeating page headers and footers (but leave title in place), and note if there are footnotes and where they are referenced. IF TEXT IS HARD TO READ THINK HARD TO UNDERSTAND AND EXTRACT IT. make sure not to remove paper text! if you are in doubt whether something is a header or main text, it is better to leave it in place.  then, produce the text of the page.
if there is a footnote, find where the footnote belongs (the place where the footnote is referenced by number!) and insert inline like this:
<insert space here>FOOTNOTE: [ TEXT ] END OF FOOTNOTE .
To be clear: for example, if text has reference [1] and foot note stating 1. SOMETEXT at bottom of page, replace [1] with
 FOOTNOTE: [ SOMETEXT ] END OF FOOTNOTE and completely exclude 1. SOMETEXT at the end of the file.

Do not use OCR do it manually!
return the result in field "file" in json.
Do not add any additional comments besides the markup above. in particular leave any notes outside of the file field in json.`
  }
};

// --------- Minimal DOM helpers ---------
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "class") node.className = v;
    else if (k === "style") Object.assign(node.style, v);
    else if (k.startsWith("on") && typeof v === "function") node.addEventListener(k.slice(2), v);
    else if (v !== undefined && v !== null) node.setAttribute(k, String(v));
  }
  for (const c of children) {
    if (c === null || c === undefined) continue;
    node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return node;
}

function setText(node, text) {
  node.textContent = text;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = el("a", { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function abortError() {
  try {
    return new DOMException("Aborted", "AbortError");
  } catch {
    const e = new Error("Aborted");
    e.name = "AbortError";
    return e;
  }
}

function sleepWithAbort(ms, abortSignal) {
  if (!(ms > 0)) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const timer = setTimeout(() => {
      cleanup();
      resolve();
    }, ms);
    const onAbort = () => {
      cleanup();
      reject(abortError());
    };
    const cleanup = () => {
      clearTimeout(timer);
      if (abortSignal) abortSignal.removeEventListener("abort", onAbort);
    };
    if (abortSignal) {
      if (abortSignal.aborted) {
        cleanup();
        reject(abortError());
        return;
      }
      abortSignal.addEventListener("abort", onAbort, { once: true });
    }
  });
}

const REQUEST_STAGGER = {
  nextAllowedAt: 0,
  lock: Promise.resolve()
};

function getRequestStaggerMs() {
  const n = Number(APP.state.requestStaggerSec);
  if (!Number.isFinite(n)) return 0;
  return Math.max(0, n) * 1000;
}

function withRequestStaggerLock(fn) {
  const run = REQUEST_STAGGER.lock.then(fn, fn);
  REQUEST_STAGGER.lock = run.catch(() => {});
  return run;
}

async function waitForNextRequestSlot(abortSignal) {
  while (true) {
    const slotAcquired = await withRequestStaggerLock(async () => {
      const now = Date.now();
      const waitMs = REQUEST_STAGGER.nextAllowedAt - now;
      if (waitMs > 0) return waitMs;
      REQUEST_STAGGER.nextAllowedAt = now + getRequestStaggerMs();
      return 0;
    });
    if (!(slotAcquired > 0)) return;
    await sleepWithAbort(slotAcquired, abortSignal);
  }
}

async function markRequestFinished() {
  await withRequestStaggerLock(async () => {
    const nextAllowed = Date.now() + getRequestStaggerMs();
    if (nextAllowed > REQUEST_STAGGER.nextAllowedAt) {
      REQUEST_STAGGER.nextAllowedAt = nextAllowed;
    }
  });
}

async function staggeredFetch(url, init = {}) {
  const abortSignal = init ? init.signal : null;
  await waitForNextRequestSlot(abortSignal);
  try {
    return await fetch(url, init);
  } finally {
    await markRequestFinished();
  }
}


// --------- Persistence ---------
const LS_KEY = "pdf2aac_app_v1";
const TEMP_SUPPORT_KEY_PREFIX = "temp_supported::";
function loadPersisted() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (typeof obj.apiKey === "string") APP.state.apiKey = obj.apiKey;
    if (typeof obj.prompt === "string") APP.state.prompt = obj.prompt;
    if (typeof obj.visionModel === "string") APP.state.visionModel = obj.visionModel;
    if (typeof obj.ttsModel === "string") APP.state.ttsModel = obj.ttsModel;
    if (typeof obj.voice === "string") APP.state.voice = obj.voice;
    if (typeof obj.ttsInstructions === "string") APP.state.ttsInstructions = obj.ttsInstructions;
    if (typeof obj.scale === "number") APP.state.scale = obj.scale;
    if (typeof obj.maxParallel === "number" && Number.isFinite(obj.maxParallel)) {
      APP.state.maxParallel = Math.max(0, Math.floor(obj.maxParallel));
    }
    if (typeof obj.requestStaggerSec === "number" && Number.isFinite(obj.requestStaggerSec)) {
      APP.state.requestStaggerSec = Math.max(0, obj.requestStaggerSec);
    }
    if (typeof obj.retryOnRateLimit495 === "boolean") {
      APP.state.retryOnRateLimit495 = obj.retryOnRateLimit495;
    }
    if (typeof obj.settingsExpanded === "boolean") APP.state.settingsExpanded = obj.settingsExpanded;
  } catch {}
}
function persist() {
  const obj = {
    apiKey: APP.state.apiKey,
    prompt: APP.state.prompt,
    visionModel: APP.state.visionModel,
    ttsModel: APP.state.ttsModel,
    voice: APP.state.voice,
    ttsInstructions: APP.state.ttsInstructions,
    scale: APP.state.scale,
    maxParallel: APP.state.maxParallel,
    requestStaggerSec: APP.state.requestStaggerSec,
    retryOnRateLimit495: APP.state.retryOnRateLimit495,
    settingsExpanded: APP.state.settingsExpanded,
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch {}
}

function getTempSupport(modelId) {
  if (!modelId) return null;
  try {
    const raw = localStorage.getItem(TEMP_SUPPORT_KEY_PREFIX + modelId);
    if (raw === "true") return true;
    if (raw === "false") return false;
  } catch {}
  return null;
}

function setTempSupport(modelId, supported) {
  if (!modelId || typeof supported !== "boolean") return;
  try { localStorage.setItem(TEMP_SUPPORT_KEY_PREFIX + modelId, String(supported)); } catch {}
}

// --------- External libs (CDN dynamic import) ---------
let pdfjsLib = null;
let JSZip = null;
let forcePdfNoWorker = false;
const scriptLoadCache = Object.create(null);
const PDFJS_CDN_URLS = [
  "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js",
  "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"
];
const PDFJS_WORKER_URLS = [
  "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js",
  "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js"
];
const JSZIP_CDN_URLS = [
  "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js",
  "https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"
];

function loadScriptOnce(url) {
  if (scriptLoadCache[url]) return scriptLoadCache[url];
  scriptLoadCache[url] = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error(`Failed to load script: ${url}`));
    document.head.appendChild(s);
  });
  return scriptLoadCache[url];
}

async function loadScriptAny(urls) {
  let lastErr = null;
  for (const url of urls) {
    try {
      await loadScriptOnce(url);
      return url;
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("Failed to load script from all configured CDNs.");
}

async function ensureLibs() {
  if (!pdfjsLib && window.pdfjsLib) pdfjsLib = window.pdfjsLib;
  if (!JSZip && window.JSZip) JSZip = window.JSZip;

  // Lazy-load UMD bundles with fallback CDNs.
  if (!pdfjsLib) {
    await loadScriptAny(PDFJS_CDN_URLS);
    if (window.pdfjsLib) pdfjsLib = window.pdfjsLib;
  }
  if (!JSZip) {
    await loadScriptAny(JSZIP_CDN_URLS);
    if (window.JSZip) JSZip = window.JSZip;
  }

  if (!pdfjsLib) throw new Error("pdfjsLib not loaded.");
  if (!JSZip) throw new Error("JSZip not loaded.");

  if (pdfjsLib.GlobalWorkerOptions && !forcePdfNoWorker) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_URLS[0];
  }
}

async function loadPdfDocument(pdfBytes) {
  const firstOpts = { data: pdfBytes };
  if (forcePdfNoWorker) firstOpts.disableWorker = true;

  try {
    return await pdfjsLib.getDocument(firstOpts).promise;
  } catch (e) {
    const msg = String(e && e.message || e);
    if (!forcePdfNoWorker && /cross-origin redirects of the top-level worker script/i.test(msg)) {
      forcePdfNoWorker = true;
      return await pdfjsLib.getDocument({ data: pdfBytes, disableWorker: true }).promise;
    }
    throw e;
  }
}

// --------- OpenAI calls ---------
function mustHaveKey() {
  if (!APP.state.apiKey || !APP.state.apiKey.trim()) {
    throw new Error("Missing OpenAI API key.");
  }
}

async function openaiVisionImageToText({ pngBlob, abortSignal }) {
  mustHaveKey();

  const dataUrl = await blobToDataURL(pngBlob); // "data:image/png;base64,..."
  const schema = {
    type: "object",
    additionalProperties: false,
    properties: { file: { type: "string" } },
    required: ["file"]
  };

  const modelId = APP.state.visionModel;
  const cachedTempSupport = getTempSupport(modelId);
  let includeTemperature = cachedTempSupport !== false;

  const makeBody = (withTemperature) => {
    const body = {
      model: modelId,
      input: [
        {
          role: "system",
          content:
            "You are transcribing a document page image. You may conceptually clean/normalize the image to read it better, " +
            "but do not use OCR/text-extraction tools. Follow the user's instructions exactly and return JSON."
        },
        {
          role: "user",
          content: [
            { type: "input_text", text: APP.state.prompt },
            { type: "input_image", image_url: dataUrl }
          ]
        }
      ],
      text: {
        format: {
          type: "json_schema",
          strict: true,
          name: "page_text",
          schema
        }
      }
    };
    if (withTemperature) body.temperature = 0;
    return body;
  };

  const sendVision = (withTemperature) => staggeredFetch("https://api.openai.com/v1/responses", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${APP.state.apiKey}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(makeBody(withTemperature)),
    signal: abortSignal
  });

  let res = await sendVision(includeTemperature);
  if (!res.ok) {
    const t = await safeReadText(res);
    if (includeTemperature && isTemperatureUnsupportedError(res.status, t)) {
      setTempSupport(modelId, false);
      includeTemperature = false;
      res = await sendVision(false);
      if (!res.ok) {
        const t2 = await safeReadText(res);
        throw makeHttpError("Vision failed", res.status, t2);
      }
    } else {
      throw makeHttpError("Vision failed", res.status, t);
    }
  }

  if (includeTemperature && cachedTempSupport !== true) {
    setTempSupport(modelId, true);
  }

  const json = await res.json();
  // The Responses API can return structured parsed output, but when calling REST directly,
  // easiest is to pull text from output_text then JSON.parse it if needed.
  // We'll try "output_parsed" (SDK-style) if present, else parse from "output_text".
  if (json.output_parsed && typeof json.output_parsed.file === "string") {
    return json.output_parsed.file;
  }

  const outText = extractOutputText(json);
  if (!outText) throw new Error("Vision failed: empty response text.");
  let parsed;
  try { parsed = JSON.parse(outText); } catch (e) {
    throw new Error("Vision failed: response was not valid JSON.");
  }
  if (!parsed || typeof parsed.file !== "string") throw new Error("Vision failed: JSON missing 'file'.");
  return parsed.file;
}

async function openaiTtsTextToAac({ text, abortSignal }) {
  mustHaveKey();

  const body = {
    model: APP.state.ttsModel,
    voice: APP.state.voice,
    input: text,
    response_format: "aac",
  };
  if (APP.state.ttsInstructions && APP.state.ttsInstructions.trim()) {
    body.instructions = APP.state.ttsInstructions.trim();
  }

  const res = await staggeredFetch("https://api.openai.com/v1/audio/speech", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${APP.state.apiKey}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body),
    signal: abortSignal
  });

  if (!res.ok) {
    const t = await safeReadText(res);
    throw makeHttpError("TTS failed", res.status, t);
  }

  const buf = await res.arrayBuffer();
  return new Uint8Array(buf);
}

// --------- Responses JSON helpers ---------
function extractOutputText(respJson) {
  // Typical structure: resp.output is array of items, each with content parts.
  // We'll walk it and concatenate any output_text parts.
  try {
    const out = respJson.output;
    if (!Array.isArray(out)) return "";
    let acc = "";
    for (const item of out) {
      const content = item && item.content;
      if (!Array.isArray(content)) continue;
      for (const part of content) {
        if (part && part.type === "output_text" && typeof part.text === "string") {
          acc += part.text;
        }
      }
    }
    return acc.trim();
  } catch {
    return "";
  }
}

async function safeReadText(res) {
  try { return (await res.text()).slice(0, 1000); } catch { return ""; }
}

function isTemperatureUnsupportedError(status, msg) {
  if (status !== 400 || !msg) return false;
  const s = String(msg).toLowerCase();
  if (!s.includes("temperature")) return false;
  return (
    s.includes("not supported") ||
    s.includes("unsupported") ||
    s.includes("unknown")
  );
}

function makeHttpError(prefix, status, bodyText) {
  const msg = `${prefix}: HTTP ${status}${bodyText ? ` ${bodyText}` : ""}`;
  const err = new Error(msg);
  err.httpStatus = status;
  return err;
}

function stripPdfExtension(fileName) {
  return String(fileName || "").replace(/\.pdf$/i, "");
}

function getDownloadNameBase() {
  return String(APP.state.downloadName || "").trim();
}

function getDownloadNamePrefix() {
  const base = getDownloadNameBase();
  return base ? `${base}_` : "";
}

function pageOutputName(pageNum, ext) {
  return `${getDownloadNamePrefix()}page_${String(pageNum).padStart(3, "0")}.${ext}`;
}

function fullOutputName(ext) {
  const base = getDownloadNameBase();
  return base ? `${base}.${ext}` : `full.${ext}`;
}

function prefixedOutputName(filename) {
  return `${getDownloadNamePrefix()}${filename}`;
}

function getPageState(pageNum) {
  return APP.state.pages.find((p) => p && p.i === pageNum) || null;
}

function resolvePageRange(totalPages) {
  const fromRaw = String(APP.state.pageRangeFrom || "").trim();
  const toRaw = String(APP.state.pageRangeTo || "").trim();

  let from = 1;
  let to = totalPages;

  if (fromRaw) {
    const n = Number(fromRaw);
    if (!Number.isInteger(n) || n < 1) throw new Error("From page must be a positive integer.");
    from = n;
  }
  if (toRaw) {
    const n = Number(toRaw);
    if (!Number.isInteger(n) || n < 1) throw new Error("To page must be a positive integer.");
    to = n;
  }

  if (from > totalPages) throw new Error(`From page must be <= ${totalPages}.`);
  if (to > totalPages) throw new Error(`To page must be <= ${totalPages}.`);
  if (from > to) throw new Error("From page must be less than or equal to To page.");
  return { from, to };
}

// --------- Blob helpers ---------
function blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onerror = () => reject(new Error("Failed to read blob."));
    r.onload = () => resolve(String(r.result));
    r.readAsDataURL(blob);
  });
}

// --------- PDF rendering ---------
async function renderPageToPngBlob(pdfDoc, pageNumber, scale) {
  const page = await pdfDoc.getPage(pageNumber);
  const viewport = page.getViewport({ scale });

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d", { alpha: false });
  canvas.width = Math.floor(viewport.width);
  canvas.height = Math.floor(viewport.height);

  await page.render({ canvasContext: ctx, viewport }).promise;

  const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
  // Cleanup
  if (page && typeof page.cleanup === "function") page.cleanup();
  canvas.width = 0; canvas.height = 0;

  if (!pngBlob) throw new Error("Failed to create PNG blob.");
  return pngBlob;
}

// --------- ZIP + concat ---------
async function zipAllTxt() {
  await ensureLibs();
  const zip = new JSZip();
  for (const p of APP.state.pages) {
    if (typeof p.txt === "string") {
      zip.file(`text/${pageOutputName(p.i, "txt")}`, p.txt);
    }
  }
  zip.file("manifest.json", JSON.stringify(makeManifest(), null, 2));
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 }});
  downloadBlob(blob, prefixedOutputName("text_pages.zip"));
}

async function zipAllAac() {
  await ensureLibs();
  const zip = new JSZip();
  for (const p of APP.state.pages) {
    if (p.aacBytes instanceof Uint8Array) {
      zip.file(`audio/${pageOutputName(p.i, "aac")}`, p.aacBytes);
    }
  }
  zip.file("manifest.json", JSON.stringify(makeManifest(), null, 2));
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 }});
  downloadBlob(blob, prefixedOutputName("aac_pages.zip"));
}

function concatAllTxt() {
  const pages = APP.state.pages
    .filter(p => typeof p.txt === "string")
    .sort((a, b) => a.i - b.i)
    .map(p => p.txt);

  if (!pages.length) throw new Error("No text pages available.");

  const joined = pages.join("\n\n");
  downloadBlob(new Blob([joined], { type: "text/plain;charset=utf-8" }), fullOutputName("txt"));
}

function concatAllAac() {
  const chunks = APP.state.pages
    .filter(p => p.aacBytes instanceof Uint8Array)
    .sort((a,b) => a.i - b.i)
    .map(p => p.aacBytes);

  if (!chunks.length) throw new Error("No AAC pages available.");

  let total = 0;
  for (const c of chunks) total += c.byteLength;
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) {
    out.set(c, off);
    off += c.byteLength;
  }
  const blob = new Blob([out], { type: "audio/aac" });
  downloadBlob(blob, fullOutputName("aac"));
}

function makeManifest() {
  return {
    source_pdf: APP.state.pdfFile ? APP.state.pdfFile.name : "",
    pages: APP.state.pages.map(p => ({
      page: p.i,
      text: p.txt ? `text/${pageOutputName(p.i, "txt")}` : null,
      audio: p.aacBytes ? `audio/${pageOutputName(p.i, "aac")}` : null,
      status: p.stage,
      error: p.err || null
    })),
    created_at: new Date().toISOString()
  };
}

// --------- Pipeline orchestration ---------
function makeAbort() {
  const ac = new AbortController();
  return ac;
}

async function processPage(pdfDoc, i, ui) {
  const p = getPageState(i);
  if (!p) return;

  p._running = true;
  p._queued = false;
  p._restartPending = false;
  p.aborts = [];

  try {
    // Render
    p.stage = "rendering";
    p.err = null;
    ui.updatePage(p);

    const acRender = makeAbort();
    p.aborts.push(acRender);
    // Render isn't fetch-based; cancellation is checked between stages.
    const png = await renderPageToPngBlob(pdfDoc, i, APP.state.scale);
    if (APP.state.cancelled) throw new Error("Cancelled");
    if (p._restartPending) throw new Error("Restart requested");

    // Vision (retry HTTP 495 until cancelled/restarted)
    const txt = await runStageWith495Retry({
      stageBase: "vision",
      pageNumber: i,
      pageState: p,
      ui,
      runAttempt: async (signal) => openaiVisionImageToText({ pngBlob: png, abortSignal: signal })
    });

    p.txt = txt;
    p.err = null;
    p.stage = "text_ready";
    ui.updatePage(p);
    ui.enableTxtDownload(p);
    ui.updateGlobalButtons();

    if (APP.state.cancelled) throw new Error("Cancelled");
    if (p._restartPending) throw new Error("Restart requested");

    // TTS (retry HTTP 495 until cancelled/restarted)
    const aacBytes = await runStageWith495Retry({
      stageBase: "tts",
      pageNumber: i,
      pageState: p,
      ui,
      runAttempt: async (signal) => openaiTtsTextToAac({ text: txt, abortSignal: signal })
    });

    p.aacBytes = aacBytes;
    p.err = null;
    p.stage = "ready";
    ui.updatePage(p);
    ui.enableAacDownload(p);
    ui.updateGlobalButtons();
  } catch (e) {
    const msg = String(e && e.message || e).toLowerCase();
    if (APP.state.cancelled || msg.includes("cancel")) {
      p.stage = "cancelled";
    } else if (p._restartPending || msg.includes("restart requested")) {
      p.stage = "queued";
      p.err = null;
    } else {
      p.stage = "failed";
      p.err = String(e && e.message || e);
    }
    ui.updatePage(p);
    ui.updateGlobalButtons();
  } finally {
    const shouldRequeue = p._restartPending && !APP.state.cancelled;
    p._running = false;
    p.aborts = [];
    p._restartPending = false;
    if (shouldRequeue && APP.state.scheduler) {
      APP.state.scheduler.enqueueImmediate(i);
    }
    ui.updatePage(p);
    // Small breather to keep UI responsive on mobile
    await sleep(50);
  }
}

async function runStageWith495Retry({ stageBase, pageNumber, pageState, ui, runAttempt }) {
  let attempt = 1;
  while (true) {
    if (APP.state.cancelled) throw new Error("Cancelled");
    if (pageState._restartPending) throw new Error("Restart requested");

    pageState.stage = attempt > 1 ? `${stageBase}(try:${attempt})` : stageBase;
    ui.updatePage(pageState);

    const ac = makeAbort();
    pageState.aborts.push(ac);
    try {
      return await runAttempt(ac.signal);
    } catch (e) {
      if (Number(e && e.httpStatus) === 495) {
        if (!APP.state.retryOnRateLimit495) throw e;
        const nextAttempt = attempt + 1;
        pageState.err = String(e && e.message || e);
        pageState.stage = `${stageBase}(try:${nextAttempt})`;
        ui.updatePage(pageState);
        ui.setStatus(`Page ${pageNumber} ${stageBase}(try:${nextAttempt}) after: ${pageState.err}`);
        attempt = nextAttempt;
        continue;
      }
      throw e;
    } finally {
      const idx = pageState.aborts.indexOf(ac);
      if (idx !== -1) pageState.aborts.splice(idx, 1);
    }
  }
}

function createPageScheduler({ pdfDoc, ui, maxParallel }) {
  const queue = [];
  let active = 0;
  let resolved = false;
  let resolveDone;
  const done = new Promise((resolve) => { resolveDone = resolve; });

  const resolveIfDone = () => {
    if (resolved) return;
    if (active === 0 && queue.length === 0) {
      resolved = true;
      resolveDone();
    }
  };

  const startPageNow = (pageNum) => {
    const p = getPageState(pageNum);
    if (!p || p._running) return false;
    const idx = queue.indexOf(pageNum);
    if (idx !== -1) queue.splice(idx, 1);
    p._queued = false;
    active += 1;
    processPage(pdfDoc, pageNum, ui)
      .catch(() => {})
      .finally(() => {
        active -= 1;
        pump();
        resolveIfDone();
      });
    ui.updatePage(p);
    return true;
  };

  const pump = () => {
    if (APP.state.cancelled) {
      queue.length = 0;
      resolveIfDone();
      return;
    }

    while (active < maxParallel && queue.length > 0 && !APP.state.cancelled) {
      const pageNum = queue.shift();
      startPageNow(pageNum);
    }

    resolveIfDone();
  };

  const enqueue = (pageNum, front = false) => {
    if (APP.state.cancelled) return false;
    const p = getPageState(pageNum);
    if (!p || p._running || p._queued) return false;
    p._queued = true;
    if (front) queue.unshift(pageNum);
    else queue.push(pageNum);
    ui.updatePage(p);
    pump();
    return true;
  };

  const enqueueImmediate = (pageNum) => {
    if (APP.state.cancelled) return false;
    return startPageNow(pageNum);
  };

  const cancel = () => {
    queue.length = 0;
    resolveIfDone();
  };

  return { enqueue, enqueueImmediate, cancel, done };
}

function resetPageForRestart(p, ui) {
  p.txt = null;
  p.aacBytes = null;
  p.err = null;
  p.stage = "queued";
  ui.enableTxtDownload(p);
  ui.enableAacDownload(p);
  ui.updatePage(p);
  ui.updateGlobalButtons();
}

async function restartPage(ui, pageNum) {
  const p = getPageState(pageNum);
  if (!p) return;
  if (!APP.state.apiKey) {
    ui.setStatus("Please enter an OpenAI API key.");
    return;
  }
  if (!APP.state.pdfFile && !APP.state.pdfBytes) {
    ui.setStatus("Please upload a PDF.");
    return;
  }

  resetPageForRestart(p, ui);

  if (APP.state.running && APP.state.scheduler) {
    if (p._running) {
      if (p._restartPending) {
        ui.setStatus(`Restart already requested for page ${pageNum}.`);
        return;
      }
      p._restartPending = true;
      for (const ac of p.aborts) {
        try { ac.abort(); } catch {}
      }
      ui.updatePage(p);
      ui.setStatus(`Restarting page ${pageNum}…`);
      return;
    }

    if (p._queued) {
      if (APP.state.scheduler.enqueueImmediate(pageNum)) {
        ui.setStatus(`Restarting page ${pageNum}…`);
      } else {
        ui.setStatus(`Page ${pageNum} cannot be restarted right now.`);
      }
      return;
    }

    if (APP.state.scheduler.enqueueImmediate(pageNum)) {
      ui.setStatus(`Restarting page ${pageNum}…`);
    } else {
      ui.setStatus(`Page ${pageNum} cannot be restarted right now.`);
    }
    return;
  }

  APP.state.cancelled = false;
  APP.state.running = true;
  ui.setRunning(true);
  ui.setStatus(`Restarting page ${pageNum}…`);

  try {
    await ensureLibs();

    let pdfDoc = APP.state.pdfDoc;
    if (!pdfDoc) {
      if (!APP.state.pdfBytes && APP.state.pdfFile) {
        APP.state.pdfBytes = await APP.state.pdfFile.arrayBuffer();
      }
      if (!APP.state.pdfBytes) throw new Error("Please upload a PDF.");
      pdfDoc = await loadPdfDocument(APP.state.pdfBytes);
      APP.state.pdfDoc = pdfDoc;
      APP.state.pageCount = pdfDoc.numPages;
    }

    const scheduler = createPageScheduler({ pdfDoc, ui, maxParallel: 1 });
    APP.state.scheduler = scheduler;
    if (!scheduler.enqueueImmediate(pageNum)) {
      throw new Error(`Page ${pageNum} cannot be restarted right now.`);
    }
    await scheduler.done;
    ui.setStatus(`Page ${pageNum} restart complete.`);
  } catch (e) {
    ui.setStatus(`Error: ${String(e && e.message || e)}`);
  } finally {
    APP.state.scheduler = null;
    APP.state.running = false;
    ui.setRunning(false);
    ui.updateGlobalButtons();
  }
}

async function restartFailedJobs(ui) {
  const failed = APP.state.pages.filter((p) => p.stage === "failed");
  if (failed.length === 0) {
    ui.setStatus("No failed pages to restart.");
    ui.updateGlobalButtons();
    return;
  }
  if (!APP.state.apiKey) {
    ui.setStatus("Please enter an OpenAI API key.");
    return;
  }
  if (!APP.state.pdfFile && !APP.state.pdfBytes) {
    ui.setStatus("Please upload a PDF.");
    return;
  }

  for (const p of failed) {
    resetPageForRestart(p, ui);
  }

  if (APP.state.running && APP.state.scheduler) {
    let restarted = 0;
    for (const p of failed) {
      if (p._running) {
        if (!p._restartPending) {
          p._restartPending = true;
          for (const ac of p.aborts) {
            try { ac.abort(); } catch {}
          }
          ui.updatePage(p);
        }
        restarted += 1;
        continue;
      }
      if (APP.state.scheduler.enqueueImmediate(p.i)) restarted += 1;
    }
    if (restarted > 0) {
      ui.setStatus(`Restarting ${restarted} failed page${restarted === 1 ? "" : "s"}…`);
    } else {
      ui.setStatus("Failed pages cannot be restarted right now.");
    }
    ui.updateGlobalButtons();
    return;
  }

  APP.state.cancelled = false;
  APP.state.running = true;
  ui.setRunning(true);
  ui.setStatus(`Restarting ${failed.length} failed page${failed.length === 1 ? "" : "s"}…`);

  try {
    await ensureLibs();

    let pdfDoc = APP.state.pdfDoc;
    if (!pdfDoc) {
      if (!APP.state.pdfBytes && APP.state.pdfFile) {
        APP.state.pdfBytes = await APP.state.pdfFile.arrayBuffer();
      }
      if (!APP.state.pdfBytes) throw new Error("Please upload a PDF.");
      pdfDoc = await loadPdfDocument(APP.state.pdfBytes);
      APP.state.pdfDoc = pdfDoc;
      APP.state.pageCount = pdfDoc.numPages;
    }

    const parsedParallel = Number(APP.state.maxParallel);
    const requestedParallel = Number.isFinite(parsedParallel)
      ? Math.max(1, Math.floor(parsedParallel))
      : 1;
    const workerCount = Math.min(requestedParallel, failed.length);

    const scheduler = createPageScheduler({ pdfDoc, ui, maxParallel: workerCount });
    APP.state.scheduler = scheduler;
    for (const p of failed) {
      scheduler.enqueue(p.i);
    }
    await scheduler.done;
    ui.setStatus(`Restarted ${failed.length} failed page${failed.length === 1 ? "" : "s"}.`);
  } catch (e) {
    ui.setStatus(`Error: ${String(e && e.message || e)}`);
  } finally {
    APP.state.scheduler = null;
    APP.state.running = false;
    ui.setRunning(false);
    ui.updateGlobalButtons();
  }
}

async function runPipeline(ui) {
  await ensureLibs();
  APP.state.cancelled = false;
  APP.state.running = true;
  APP.state.scheduler = null;
  ui.setRunning(true);

  try {
    if (!APP.state.pdfFile) throw new Error("Please upload a PDF.");
    if (!APP.state.apiKey) throw new Error("Please enter an OpenAI API key.");

    // Read PDF bytes
    ui.setStatus("Reading PDF…");
    APP.state.pdfBytes = await APP.state.pdfFile.arrayBuffer();

    ui.setStatus("Loading PDF…");
    const pdfDoc = await loadPdfDocument(APP.state.pdfBytes);
    APP.state.pdfDoc = pdfDoc;
    APP.state.pageCount = pdfDoc.numPages;
    const pageRange = resolvePageRange(APP.state.pageCount);

    // Create slots
    APP.state.pages = [];
    ui.clearPages();
    for (let i = pageRange.from; i <= pageRange.to; i++) {
      const p = {
        i,
        stage: "queued",
        txt: null,
        aacBytes: null,
        err: null,
        aborts: [],
        _running: false,
        _queued: false,
        _restartPending: false
      };
      APP.state.pages.push(p);
      ui.addPageRow(p);
    }
    ui.updateGlobalButtons();

    const parsedParallel = Number(APP.state.maxParallel);
    const requestedParallel = Number.isFinite(parsedParallel)
      ? Math.max(0, Math.floor(parsedParallel))
      : 0;
    const selectedCount = APP.state.pages.length;
    const workerCount = Math.min(requestedParallel, selectedCount);
    if (workerCount === 0) {
      ui.setStatus(`Queued pages ${pageRange.from}-${pageRange.to} (${selectedCount} total). Manual mode: use Restart Page to start jobs.`);
    } else {
      ui.setStatus(`Processing pages ${pageRange.from}-${pageRange.to} (${selectedCount} total, max parallel: ${workerCount})…`);
    }

    const scheduler = createPageScheduler({ pdfDoc, ui, maxParallel: workerCount });
    APP.state.scheduler = scheduler;
    for (const p of APP.state.pages) {
      scheduler.enqueue(p.i);
    }
    await scheduler.done;

    ui.setStatus(APP.state.cancelled ? "Cancelled." : "Done.");
  } catch (e) {
    ui.setStatus(`Error: ${String(e && e.message || e)}`);
  } finally {
    APP.state.scheduler = null;
    APP.state.running = false;
    ui.setRunning(false);
    ui.updateGlobalButtons();
  }
}

function cancelPipeline(ui) {
  APP.state.cancelled = true;
  if (APP.state.scheduler && typeof APP.state.scheduler.cancel === "function") {
    APP.state.scheduler.cancel();
  }
  for (const p of APP.state.pages) {
    p._restartPending = false;
    for (const ac of p.aborts) {
      try { ac.abort(); } catch {}
    }
    if (!p._running && (p._queued || p.stage === "queued")) {
      p._queued = false;
      p.stage = "cancelled";
      ui.updatePage(p);
    }
  }
  ui.setStatus("Cancelling…");
  ui.setRunning(false);
  ui.updateGlobalButtons();
}

      pdfInput.disabled = running;
      nameInput.disabled = running;
      pageFromInput.disabled = running;
      pageToInput.disabled = running;
      visionModelInput.disabled = running;
      ttsModelInput.disabled = running;
      voiceInput.disabled = running;
      ttsInstr.disabled = running;
      scaleInput.disabled = running;
      parallelInput.disabled = running;
    },
    clearPages: () => { tbody.innerHTML = ""; },
    addPageRow: (p) => {
      const txtBtn = el("button", { style: miniBtnStyle(), disabled: true }, "Download TXT");
      const aacBtn = el("button", { style: miniBtnStyle(), disabled: true }, "Download AAC");
      const restartBtn = el("button", { style: miniBtnStyle(), disabled: true }, "Restart Page");

      txtBtn.addEventListener("click", () => {
        if (typeof p.txt === "string") {
          downloadBlob(new Blob([p.txt], { type: "text/plain;charset=utf-8" }), pageOutputName(p.i, "txt"));
        }
      });
      aacBtn.addEventListener("click", () => {
        if (p.aacBytes instanceof Uint8Array) {
          downloadBlob(new Blob([p.aacBytes], { type: "audio/aac" }), pageOutputName(p.i, "aac"));
        }
      });
      restartBtn.addEventListener("click", async () => {
        await restartPage(ui, p.i);
      });

      const stageSpan = el("span", {}, p.stage);
      const errSpan = el("div", { style: { color: "#b00020", whiteSpace: "pre-wrap" } }, "");

      const row = el("tr", {},
        tdNode(el("span", {}, String(p.i))),
        tdNode(stageSpan),
        tdNode(txtBtn),
        tdNode(aacBtn),
        tdNode(restartBtn),
        tdNode(errSpan)
      );

      p._ui = { row, stageSpan, txtBtn, aacBtn, restartBtn, errSpan };
      tbody.appendChild(row);
    },
    updatePage: (p) => {
      if (!p._ui) return;
      setText(p._ui.stageSpan, p.stage);
      setText(p._ui.errSpan, p.err ? p.err : "");
      if (p.stage === "failed") {
        p._ui.row.style.background = "#fff5f5";
      } else if (p.stage === "ready") {
        p._ui.row.style.background = "#f3fff3";
      } else if (p.stage === "cancelled") {
        p._ui.row.style.background = "#f7f7f7";
      } else {
        p._ui.row.style.background = "";
      }
      p._ui.restartBtn.disabled = !!p._restartPending;
    },
    enableTxtDownload: (p) => { if (p._ui) p._ui.txtBtn.disabled = !(typeof p.txt === "string"); },
    enableAacDownload: (p) => { if (p._ui) p._ui.aacBtn.disabled = !(p.aacBytes instanceof Uint8Array); },
    updateGlobalButtons: () => {
      const allTxtReady = APP.state.pages.length > 0 && APP.state.pages.every(p => typeof p.txt === "string" || p.stage === "cancelled" || p.stage === "failed");
      const allAacReady = APP.state.pages.length > 0 && APP.state.pages.every(p => (p.aacBytes instanceof Uint8Array) || p.stage === "cancelled" || p.stage === "failed");

      // Enable ZIP only when all relevant outputs exist (ignoring failed/cancelled pages)
      const anyTxt = APP.state.pages.some(p => typeof p.txt === "string");
      const anyAac = APP.state.pages.some(p => p.aacBytes instanceof Uint8Array);

      zipTxtBtn.disabled = !(allTxtReady && anyTxt && !APP.state.running);
      fullTxtBtn.disabled = !(allTxtReady && anyTxt && !APP.state.running);
      zipAacBtn.disabled = !(allAacReady && anyAac && !APP.state.running);
      fullAacBtn.disabled = !(allAacReady && anyAac && !APP.state.running);

      const hasPages = APP.state.pages.length > 0;
      const allQueued = hasPages && APP.state.pages.every(p => p.stage === "queued");
      const anyInProgress = APP.state.pages.some(p =>
        p._running ||
        p.stage === "rendering" ||
        p.stage === "text_ready" ||
        String(p.stage || "").startsWith("vision") ||
        String(p.stage || "").startsWith("tts")
      );
      const anyFailed = APP.state.pages.some(p => p.stage === "failed");
      const allDone = hasPages && APP.state.pages.every(p =>
        p.stage === "ready" || p.stage === "failed" || p.stage === "cancelled"
      );
      const readyForDownload = !APP.state.running && ((allTxtReady && anyTxt) || (allAacReady && anyAac));
      restartFailedBtn.disabled = !anyFailed;

      let emoji = "🧘😴";
      let label = "Not started";
      if (anyInProgress || (APP.state.running && !allQueued)) {
        emoji = "👷‍♂⏳";
        label = "Working";
      } else if (!APP.state.running && allDone && anyFailed) {
        emoji = "🤷😘";
        label = "Done with failures";
      } else if (readyForDownload) {
        emoji = "👍😘";
        label = "Ready";
      }
      downloadStateEmoji.textContent = emoji;
      downloadStateEmoji.title = label;
      downloadStateEmoji.setAttribute("aria-label", label);
    }
  };

  // Layout
  const grid = el("div", { style: { display: "grid", gridTemplateColumns: "1fr", gap: "12px" } },
    title,
    status,
    el("div", {},
      el("div", { style: Object.assign({}, labelStyle(), { display: "flex", gap: "10px", alignItems: "center", marginBottom: "6px" }) },
        el("div", { style: { minWidth: "24px", margin: 0 } }, "1)"),
        el("div", {}, "OpenAI API key")
      ),
      keyInput,
      keyLinks
    ),
    el("div", {},
      el("div", { style: Object.assign({}, labelStyle(), { display: "flex", gap: "10px", alignItems: "center", marginBottom: "6px" }) },
        el("div", { style: { minWidth: "24px", margin: 0 } }, "2)"),
        el("div", {}, "Upload PDF")
      ),
      el("div", { style: { marginTop: "4px", display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" } },
        el("div", { style: { display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" } },
          pdfInput
        ),
        el("div", { style: { fontSize: "12px", color: "#444", whiteSpace: "nowrap" } }, "Name"),
        el("div", { style: { width: "180px" } }, nameInput),
        el("div", { style: { fontSize: "12px", color: "#444", whiteSpace: "nowrap" } }, "From page"),
        el("div", { style: { width: "72px" } }, pageFromInput),
        el("div", { style: { fontSize: "12px", color: "#444", whiteSpace: "nowrap" } }, "To page"),
        el("div", { style: { width: "72px" } }, pageToInput)
      )
    ),
    el("div", {},
      el("div", { style: { display: "flex", alignItems: "center", gap: "10px", flexWrap: "wrap" } },
        el("div", { style: Object.assign({}, labelStyle(), { margin: 0, minWidth: "24px" }) }, "3)"),
        settingsToggleBtn
      ),
      settingsPanel
    ),
    el("div", { style: { display: "flex", gap: "10px", flexWrap: "wrap", alignItems: "center" } },
      el("div", { style: Object.assign({}, labelStyle(), { margin: 0, minWidth: "24px" }) }, "4)"),
      startBtn, cancelBtn, restartFailedBtn
    ),
    el("div", { style: { display: "flex", gap: "10px", flexWrap: "wrap", alignItems: "center" } },
      el("div", { style: Object.assign({}, labelStyle(), { margin: 0, minWidth: "24px" }) }, "5)"),
      downloadStateEmoji,
      zipTxtBtn, fullTxtBtn, zipAacBtn, fullAacBtn
    ),
    pageTable
  );

  root.appendChild(grid);
  document.body.appendChild(root);

  // Load persisted into UI
  keyInput.value = APP.state.apiKey;
  promptArea.value = APP.state.prompt || APP.defaults.prompt;
  if (!APP.state.prompt) APP.state.prompt = promptArea.value;
  visionModelInput.value = APP.state.visionModel;
  ttsModelInput.value = APP.state.ttsModel;
  voiceInput.value = APP.state.voice;
  ttsInstr.value = APP.state.ttsInstructions;
  scaleInput.value = String(APP.state.scale);
  parallelInput.value = String(APP.state.maxParallel);
  staggerInput.value = String(APP.state.requestStaggerSec);
  retry495Input.checked = !!APP.state.retryOnRateLimit495;
  nameInput.value = APP.state.downloadName;
  pageFromInput.value = "";
  pageToInput.value = "";

  updateSettingsPanel({ animate: false });
  ui.setRunning(false);
  ui.updateGlobalButtons();
  return ui;
}

function btnStyle(overrides = {}) {
  return Object.assign({
    padding: "10px 12px",
    borderRadius: "10px",
    border: "1px solid #ccc",
    background: "#fff",
    cursor: "pointer"
  }, overrides || {});
}
function miniBtnStyle() {
  return {
    padding: "6px 10px",
    borderRadius: "10px",
    border: "1px solid #ccc",
    background: "#fff",
    cursor: "pointer"
  };
}
function labelStyle() {
  return { fontSize: "12px", color: "#444", marginBottom: "6px" };
}

// --------- Boot ---------
loadPersisted();
if (!APP.state.prompt) APP.state.prompt = APP.defaults.prompt;
persist();

const ui = buildUI();
ui.setStatus("Ready. Enter key, upload PDF, edit prompt if needed, then Start.");


</script>

</body>
</html>
